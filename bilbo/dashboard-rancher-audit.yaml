# Grafana dashboard for Rancher UI audit logs, loaded via the Grafana dashboards
# sidecar (label grafana_dashboard="1"). Queries parse the audit JSON at query time
# with `| json`, so they work regardless of which fields the shipper promotes to labels.
# Field names follow Rancher's API audit schema (user.name -> user_name, method,
# requestURI, responseCode). Adjust if a real log line shows different keys.
apiVersion: v1
kind: ConfigMap
metadata:
  name: rancher-audit-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  rancher-audit.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 0,
      "title": "Rancher Audit",
      "uid": "rancher-audit",
      "schemaVersion": 39,
      "version": 1,
      "time": { "from": "now-6h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "loki",
            "current": { "text": "Loki", "value": "loki" },
            "hide": 0
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Audit actions over time (by method)",
          "datasource": { "type": "loki", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 16, "x": 0, "y": 0 },
          "fieldConfig": { "defaults": { "custom": { "drawStyle": "bars", "stacking": { "mode": "normal" } } }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "loki", "uid": "${datasource}" },
              "expr": "sum by (method) (count_over_time({job=\"rancher-audit\"} | json [$__auto]))",
              "queryType": "range"
            }
          ]
        },
        {
          "id": 2,
          "type": "bargauge",
          "title": "Top users (selected range)",
          "datasource": { "type": "loki", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 0 },
          "options": { "orientation": "horizontal", "displayMode": "gradient" },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "loki", "uid": "${datasource}" },
              "expr": "topk(10, sum by (user_name) (count_over_time({job=\"rancher-audit\"} | json [$__range])))",
              "queryType": "instant",
              "legendFormat": "{{user_name}}"
            }
          ]
        },
        {
          "id": 3,
          "type": "logs",
          "title": "Recent Rancher UI audit actions",
          "datasource": { "type": "loki", "uid": "${datasource}" },
          "gridPos": { "h": 16, "w": 24, "x": 0, "y": 8 },
          "options": { "showTime": true, "wrapLogMessage": true, "prettifyLogMessage": false, "enableLogDetails": true, "dedupStrategy": "none", "sortOrder": "Descending" },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "loki", "uid": "${datasource}" },
              "expr": "{job=\"rancher-audit\"} | json | line_format \"{{.user_name}}  {{.method}}  {{.requestURI}}  -> {{.responseCode}}\"",
              "queryType": "range"
            }
          ]
        }
      ]
    }
