# Grafana dashboard for Rancher UI audit logs, loaded via the Grafana dashboards
# sidecar (label grafana_dashboard="1"). The logs panel renders each audit entry as a
# readable "user verb resource (name)" sentence: the actor is the Rancher local/login
# username (stream label `actor`, set by the Alloy pipeline from user.extra.username with
# a fallback to the principal), the verb is mapped from the HTTP method, and the resource
# kind + namespace/name are parsed from requestURI at query time.
#
# The logs-panel LogQL is documented in docs/usage.md; edit the dashboard in Grafana and
# re-export, or tweak the JSON below (mind the escaping).
apiVersion: v1
kind: ConfigMap
metadata:
  name: rancher-audit-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  rancher-audit.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "graphTooltip": 0,
      "title": "Rancher Audit",
      "uid": "rancher-audit",
      "schemaVersion": 39,
      "version": 2,
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "loki",
            "current": {
              "text": "Loki",
              "value": "loki"
            },
            "hide": 0
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Audit actions over time (by HTTP method)",
          "datasource": {
            "type": "loki",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 7,
            "w": 16,
            "x": 0,
            "y": 0
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "bars",
                "stacking": {
                  "mode": "normal"
                }
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "loki",
                "uid": "${datasource}"
              },
              "queryType": "range",
              "expr": "sum by (method) (count_over_time({job=\"rancher-audit\"}[$__auto]))"
            }
          ]
        },
        {
          "id": 2,
          "type": "bargauge",
          "title": "Top users (by login name)",
          "datasource": {
            "type": "loki",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 7,
            "w": 8,
            "x": 16,
            "y": 0
          },
          "options": {
            "orientation": "horizontal",
            "displayMode": "gradient"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "loki",
                "uid": "${datasource}"
              },
              "queryType": "instant",
              "expr": "topk(10, sum by (actor) (count_over_time({job=\"rancher-audit\", actor!=\"\"}[$__range])))",
              "legendFormat": "{{actor}}"
            }
          ]
        },
        {
          "id": 3,
          "type": "logs",
          "title": "Audit events  \u2014  \"user verb resource (name)\"",
          "datasource": {
            "type": "loki",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 17,
            "w": 24,
            "x": 0,
            "y": 7
          },
          "options": {
            "showTime": true,
            "wrapLogMessage": true,
            "prettifyLogMessage": false,
            "enableLogDetails": true,
            "dedupStrategy": "none",
            "sortOrder": "Descending"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": {
                "type": "loki",
                "uid": "${datasource}"
              },
              "queryType": "range",
              "expr": "{job=\"rancher-audit\"}\n| json uri=\"requestURI\"\n| __error__=\"\"\n| uri!~`/dashboard/.*|.*\\.(js|css|svg|png|woff2?|ico|map|json)|/healthz|/ping|/v3/connect|/metricsendpoint.*`\n| label_format verb=`{{ if eq .method \"POST\" }}{{ if (contains \"action=\" .uri) }}invoke{{ else }}create{{ end }}{{ else if eq .method \"DELETE\" }}delete{{ else if eq .method \"PUT\" }}update{{ else if eq .method \"PATCH\" }}update{{ else if eq .method \"GET\" }}get{{ else }}{{ lower .method }}{{ end }}`\n| label_format path=`{{ regexReplaceAll \"\\\\?.*\" .uri \"\" }}`\n| label_format rtype=`{{ regexReplaceAll \"^.*/v[0-9]+(?:alpha[0-9]+|beta[0-9]+)?(?:-public)?/([^/]+).*$\" .path \"${1}\" }}`\n| label_format kind=`{{ regexReplaceAll \"^.*\\\\.\" .rtype \"\" }}`\n| label_format target=`{{ regexReplaceAll \"^.*/v[0-9]+(?:alpha[0-9]+|beta[0-9]+)?(?:-public)?/[^/]+/?\" .path \"\" }}`\n| line_format `{{ .actor }} {{ .verb }} {{ .kind }}{{ if .target }} {{ .target }}{{ end }}`"
            }
          ]
        }
      ]
    }
