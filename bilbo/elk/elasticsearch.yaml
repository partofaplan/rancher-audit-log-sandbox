# Single-node Elasticsearch for the sandbox. Security DISABLED (plain HTTP, no auth/TLS)
# to keep local testing simple — do not use this profile in production.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: elasticsearch-data
  namespace: monitoring
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch
  namespace: monitoring
  labels: { app: elasticsearch }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: elasticsearch }
  template:
    metadata:
      labels: { app: elasticsearch }
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:8.17.3
          env:
            - { name: discovery.type, value: single-node }
            - { name: xpack.security.enabled, value: "false" }
            - { name: xpack.security.http.ssl.enabled, value: "false" }
            - { name: cluster.name, value: rancher-audit }
            - { name: bootstrap.memory_lock, value: "false" }
            - { name: ES_JAVA_OPTS, value: "-Xms512m -Xmx512m" }
          ports:
            - { name: http, containerPort: 9200 }
          readinessProbe:
            httpGet: { path: "/_cluster/health?wait_for_status=yellow&timeout=1s", port: 9200 }
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 30
          resources:
            requests: { cpu: 250m, memory: 1Gi }
            limits: { memory: 1536Mi }
          volumeMounts:
            - { name: data, mountPath: /usr/share/elasticsearch/data }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: elasticsearch-data
---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: monitoring
  labels: { app: elasticsearch }
spec:
  selector: { app: elasticsearch }
  ports:
    - { name: http, port: 9200, targetPort: 9200 }
---
# NodePort so the rancher-desktop cluster can reach ES directly on a NON-:80 host port.
# (:80 can't be used cross-cluster — from a rancher-desktop pod, :80 on every host IP is
# rancher-desktop's OWN Traefik, not bilbo's.) Published to the Mac host via the k3d
# loadbalancer: `k3d cluster edit bilbo --port-add "9200:30920@loadbalancer"` (install.sh
# does this). Reachable from a rancher-desktop pod at http://<host-gateway>:9200 — no Traefik,
# no /es prefix. Filebeat ships straight here.
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch-ext
  namespace: monitoring
  labels: { app: elasticsearch }
spec:
  type: NodePort
  selector: { app: elasticsearch }
  ports:
    - { name: http, port: 9200, targetPort: 9200, nodePort: 30920 }
