# Kibana, pointed at the in-cluster Elasticsearch (security disabled → no credentials).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kibana
  namespace: monitoring
  labels: { app: kibana }
spec:
  replicas: 1
  selector:
    matchLabels: { app: kibana }
  template:
    metadata:
      labels: { app: kibana }
    spec:
      containers:
        - name: kibana
          image: docker.elastic.co/kibana/kibana:8.17.3
          env:
            - { name: ELASTICSEARCH_HOSTS, value: "http://elasticsearch:9200" }
            - { name: SERVER_NAME, value: kibana }
            - { name: SERVER_HOST, value: "0.0.0.0" }
            # Served behind Traefik at http://kibana.localhost
            - { name: SERVER_PUBLICBASEURL, value: "http://kibana.localhost" }
          ports:
            - { name: http, containerPort: 5601 }
          readinessProbe:
            httpGet: { path: /api/status, port: 5601 }
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 40
          resources:
            requests: { cpu: 100m, memory: 768Mi }
            limits: { memory: 1536Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: kibana
  namespace: monitoring
  labels: { app: kibana }
spec:
  selector: { app: kibana }
  ports:
    - { name: http, port: 5601, targetPort: 5601 }
