# Grafana — sandbox profile. Chart: grafana/grafana 10.5.x (app 12.x).
# Loki datasource pre-provisioned; the "Rancher Audit" dashboard is loaded from a
# labeled ConfigMap via the dashboards sidecar (see bilbo/dashboard-rancher-audit.yaml).
replicaCount: 1

service:
  type: ClusterIP

persistence:
  enabled: true
  size: 5Gi

adminUser: admin
adminPassword: admin

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        uid: loki
        access: proxy
        url: http://loki.monitoring.svc.cluster.local:3100
        isDefault: true
        jsonData:
          maxLines: 1000

# Pick up dashboards from ConfigMaps labeled grafana_dashboard="1" in this namespace.
sidecar:
  dashboards:
    enabled: true
    label: grafana_dashboard
    labelValue: "1"
    searchNamespace: monitoring
    folderAnnotation: grafana_folder
    provider:
      foldersFromFilesStructure: true
