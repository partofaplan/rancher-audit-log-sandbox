# Grafana Loki — single-binary, filesystem storage.
# Sandbox profile: no object store, no caches, no canary. Chart: grafana/loki 7.0.0.
# In-cluster push/query endpoint: http://loki.monitoring.svc.cluster.local:3100
deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  # Minimal schema for testing/sandbox (tsdb + v13, filesystem object store).
  useTestSchema: true
  limits_config:
    allow_structured_metadata: true
    volume_enabled: true
    retention_period: 168h # 7d
  # Single-binary runs every target in one process; silence the structured-metadata
  # schema requirement noise by pinning the test schema (handled by useTestSchema).
  server:
    http_listen_port: 3100

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 10Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi

# Zero out the simple-scalable targets — single binary handles everything.
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

# Disable everything not needed for a local sandbox.
chunksCache:
  enabled: false
resultsCache:
  enabled: false
lokiCanary:
  enabled: false
test:
  enabled: false
gateway:
  enabled: false
minio:
  enabled: false
