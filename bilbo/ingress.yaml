# Ingress for cross-cluster access on bilbo (k3d Traefik publishes :80 on the Mac host).
#
# - Loki: hostless, PathPrefix /loki -> loki:3100. Loki's real endpoints already live
#   under /loki/... (e.g. /loki/api/v1/push), so no path rewrite is needed. This is the
#   endpoint Grafana Alloy on rancher-desktop pushes to, via the Mac host IP.
# - Grafana: host grafana.localhost (resolves to 127.0.0.1 on macOS) -> grafana:80,
#   so you can open http://grafana.localhost in the browser.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: loki
  namespace: monitoring
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /loki
            pathType: Prefix
            backend:
              service:
                name: loki
                port:
                  number: 3100
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: monitoring
spec:
  ingressClassName: traefik
  rules:
    - host: grafana.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 80
