apiVersion: rancheraudit.io/v1alpha1
kind: AuditLogConfig
metadata:
  name: auditlogconfig-sample
  namespace: default
spec:
  elasticsearch:
    # bilbo's Elasticsearch, fronted by Traefik on the Mac host under a stripped /es prefix.
    # 192.168.5.2 is the rancher-desktop (lima) host gateway; 192.168.64.1 also works.
    # NOTE: include the port — Filebeat defaults to :9200 if it's omitted, but bilbo's
    # Traefik (which fronts ES under /es) listens on :80.
    host: http://192.168.5.2:80
    pathPrefix: /es
    index: rancher-audit
  # source defaults to a standard Rancher Manager install; shown here for clarity.
  source:
    namespace: cattle-system
    podSelector:
      app: rancher
    container: rancher-audit-log
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.17.3
