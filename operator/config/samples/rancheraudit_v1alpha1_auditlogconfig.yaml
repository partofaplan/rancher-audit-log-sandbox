apiVersion: rancheraudit.io/v1alpha1
kind: AuditLogConfig
metadata:
  name: auditlogconfig-sample
  namespace: default
spec:
  elasticsearch:
    # bilbo's Elasticsearch, reached DIRECTLY on its NodePort published at the Mac host :9200
    # (k3d `--port-add 9200:30920@loadbalancer`). Do NOT use :80 / the /es Traefik route here:
    # from a rancher-desktop pod, :80 on every host IP is rancher-desktop's OWN Traefik, not
    # bilbo's. 192.168.64.1 is the Mac's gateway on the rancher-desktop vmnet (192.168.5.2 also
    # works); confirm with a probe pod if these differ on your machine.
    host: http://192.168.64.1:9200
    index: rancher-audit
  # no pathPrefix — we hit Elasticsearch directly, not through a proxy.
  # source defaults to a standard Rancher Manager install; shown here for clarity.
  source:
    namespace: cattle-system
    podSelector:
      app: rancher
    container: rancher-audit-log
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.17.3
