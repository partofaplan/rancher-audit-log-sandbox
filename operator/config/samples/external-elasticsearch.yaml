# Plug the operator into an EXISTING (secured) Elasticsearch / ELK stack.
# Replace the host, credentials/certs, and CA with your stack's real values.
#
# Auth options (use whichever your ELK requires):
#   - basic auth      -> elasticsearch.basicAuthSecretRef (Secret: username/password)
#   - mutual TLS       -> elasticsearch.tls.clientCertSecretRef (TLS Secret: tls.crt/tls.key)
# TLS server verification:
#   - public/trusted   -> omit elasticsearch.tls
#   - private CA       -> elasticsearch.tls.caSecretRef (Secret: ca.crt)
#   - skip verify      -> elasticsearch.tls.insecureSkipVerify: true (sandbox only)
#
# This example uses MUTUAL TLS (client cert) — the common pattern for a hardened ELK.
apiVersion: v1
kind: Secret
metadata:
  name: elastic-client-cert
  namespace: default
type: kubernetes.io/tls
stringData:
  tls.crt: |
    -----BEGIN CERTIFICATE-----
    REPLACE-WITH-YOUR-CLIENT-CERTIFICATE
    -----END CERTIFICATE-----
  tls.key: |
    -----BEGIN PRIVATE KEY-----
    REPLACE-WITH-YOUR-CLIENT-KEY
    -----END PRIVATE KEY-----
---
apiVersion: v1
kind: Secret
metadata:
  name: elastic-ca
  namespace: default
type: Opaque
stringData:
  ca.crt: |
    -----BEGIN CERTIFICATE-----
    REPLACE-WITH-YOUR-ELASTICSEARCH-CA-BUNDLE
    -----END CERTIFICATE-----
---
apiVersion: rancheraudit.io/v1alpha1
kind: AuditLogConfig
metadata:
  name: rancher-audit-external
  namespace: default
spec:
  elasticsearch:
    host: https://elasticsearch.example.com:443
    protocol: https
    index: rancher-audit
    preset: balanced                 # optional Filebeat output preset
    pipeline: filebeat-applog-master  # optional ES ingest pipeline
    tls:
      clientCertSecretRef: elastic-client-cert   # mutual-TLS auth
      caSecretRef: elastic-ca                     # trust the ES server CA
  source:
    namespace: cattle-system
    container: rancher-audit-log
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.17.3
