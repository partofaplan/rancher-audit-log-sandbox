# This rule is not used by the project rancher-audit-log-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the rancheraudit.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: rancher-audit-log-operator
    app.kubernetes.io/managed-by: kustomize
  name: auditlogconfig-editor-role
rules:
- apiGroups:
  - rancheraudit.io
  resources:
  - auditlogconfigs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - rancheraudit.io
  resources:
  - auditlogconfigs/status
  verbs:
  - get
