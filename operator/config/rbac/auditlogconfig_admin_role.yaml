# This rule is not used by the project rancher-audit-log-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over rancheraudit.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: rancher-audit-log-operator
    app.kubernetes.io/managed-by: kustomize
  name: auditlogconfig-admin-role
rules:
- apiGroups:
  - rancheraudit.io
  resources:
  - auditlogconfigs
  verbs:
  - '*'
- apiGroups:
  - rancheraudit.io
  resources:
  - auditlogconfigs/status
  verbs:
  - get
