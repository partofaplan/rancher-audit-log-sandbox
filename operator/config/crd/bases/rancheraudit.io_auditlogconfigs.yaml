apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: auditlogconfigs.rancheraudit.io
spec:
  group: rancheraudit.io
  names:
    kind: AuditLogConfig
    plural: auditlogconfigs
    singular: auditlogconfig
    shortNames:
      - alc
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                loki:
                  type: object
                  properties:
                    url:
                      type: string
                    tenant:
                      type: string
                    basicAuthSecretRef:
                      type: string
                  required:
                    - url
                forwarder:
                  type: object
                  properties:
                    image:
                      type: string
                    replicas:
                      type: integer
                    resources:
                      type: object
                auditLevels:
                  type: array
                  items:
                    type: string
      subresources:
        status: {}
