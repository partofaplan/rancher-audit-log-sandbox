{{- /* Create the ES basic-auth secret only when inline creds are given and no existing secret is referenced. */ -}}
{{- if and .Values.elasticsearch.auth.username (not .Values.elasticsearch.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "operator.authSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "operator.labels" . | nindent 4 }}
type: Opaque
stringData:
  username: {{ .Values.elasticsearch.auth.username | quote }}
  password: {{ .Values.elasticsearch.auth.password | quote }}
{{- end }}
{{- if and .Values.elasticsearch.tls.caCert (not .Values.elasticsearch.tls.existingCASecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "operator.caSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "operator.labels" . | nindent 4 }}
type: Opaque
stringData:
  ca.crt: |
    {{- .Values.elasticsearch.tls.caCert | nindent 4 }}
{{- end }}
