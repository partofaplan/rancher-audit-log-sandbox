name: air-gap-bundle

# Build the self-contained air-gap bundle (images + chart + ELK handoff + docs) and publish it
# as a downloadable artifact. On a version tag it is also attached to the GitHub Release.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # needed to create/attach the GitHub Release asset

jobs:
  bundle:
    runs-on: ubuntu-latest
    env:
      GOPROXY: https://proxy.golang.org,direct
      GOFLAGS: -mod=mod
      GOSUMDB: sum.golang.org
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: operator/go.mod
          cache-dependency-path: operator/go.sum

      - name: Install Helm
        run: curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Resolve version (from Chart.yaml)
        id: ver
        run: echo "version=$(grep '^version:' charts/rancher-audit-log-operator/Chart.yaml | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Build air-gap bundle
        run: ./scripts/build-airgap-bundle.sh

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: rancher-audit-log-airgap-${{ steps.ver.outputs.version }}
          path: dist/*.tar.gz
          if-no-files-found: error

      - name: Attach to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/*.tar.gz --generate-notes \
            || gh release upload "${GITHUB_REF_NAME}" dist/*.tar.gz --clobber
